<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ADL Finance — Borne d'accueil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --adl-blue: #5BC8F5;
    --adl-blue-dark: #2aaee0;
    --adl-blue-deeper: #0d8fbf;
    --white: #ffffff;
    --text-light: rgba(255,255,255,0.75);
    --card-bg: rgba(255,255,255,0.15);
    --card-hover: rgba(255,255,255,0.28);
    --card-active: rgba(255,255,255,0.38);
    --border: rgba(255,255,255,0.35);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background: var(--adl-blue);
    touch-action: manipulation;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: -50%;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,255,255,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(11,143,191,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255,255,255,0.08) 0%, transparent 70%);
    animation: bgshift 12s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgshift {
    0%   { transform: translate(0,0) rotate(0deg); }
    100% { transform: translate(3%,2%) rotate(3deg); }
  }

  .screen {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    width: 100vw;
    height: 100vh;
    padding: 5vh 4vw;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: fadeDown 0.7s ease both;
  }

  .logo-block {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .logo-img {
    width: clamp(130px, 18vw, 190px);
    height: clamp(130px, 18vw, 190px);
    border-radius: 24px;
    object-fit: cover;
    display: block;
  }

  .welcome-msg {
    font-size: clamp(15px, 2.5vw, 22px);
    font-weight: 300;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.02em;
    margin-top: 4px;
  }

  /* ── CARDS ── */
  .services {
    display: flex;
    gap: clamp(14px, 2.5vw, 28px);
    width: 100%;
    max-width: 900px;
    animation: fadeUp 0.7s 0.15s ease both;
  }

  .card {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: clamp(20px, 3.5vh, 40px) clamp(12px, 2vw, 24px);
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    cursor: pointer;
    transition: background 0.18s, transform 0.18s, border-color 0.18s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    text-align: center;
  }

  .card:hover {
    background: var(--card-hover);
    border-color: rgba(255,255,255,0.55);
    transform: translateY(-3px);
  }

  .card:active, .card.pressed {
    background: var(--card-active);
    transform: scale(0.96);
    border-color: rgba(255,255,255,0.7);
  }

  .card-icon {
    width: clamp(52px, 8vw, 76px);
    height: clamp(52px, 8vw, 76px);
    border-radius: 50%;
    background: rgba(255,255,255,0.22);
    border: 1.5px solid rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-icon svg {
    width: 45%;
    height: 45%;
    fill: white;
  }

  .card-title {
    font-size: clamp(16px, 2.6vw, 26px);
    font-weight: 600;
    color: white;
    letter-spacing: 0.02em;
  }

  .card-sub {
    font-size: clamp(11px, 1.5vw, 15px);
    font-weight: 300;
    color: rgba(255,255,255,0.72);
    line-height: 1.4;
  }

  /* ── FOOTER ── */
  .footer {
    font-size: clamp(11px, 1.4vw, 14px);
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.05em;
    animation: fadeUp 0.7s 0.3s ease both;
  }

  /* ── CONFIRMATION OVERLAY ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(11, 143, 191, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  .overlay.show { display: flex; }

  .overlay-circle {
    width: clamp(80px, 16vw, 130px);
    height: clamp(80px, 16vw, 130px);
    border-radius: 50%;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .overlay-circle svg {
    width: 48%;
    height: 48%;
    fill: var(--adl-blue-deep, #2aaee0);
  }

  .overlay h2 {
    font-size: clamp(22px, 4vw, 38px);
    font-weight: 700;
    color: white;
    text-align: center;
    animation: fadeUp 0.4s 0.15s ease both;
  }

  .overlay p {
    font-size: clamp(14px, 2vw, 20px);
    font-weight: 300;
    color: rgba(255,255,255,0.82);
    text-align: center;
    animation: fadeUp 0.4s 0.25s ease both;
  }

  .overlay-bar {
    width: clamp(160px, 30vw, 280px);
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.25);
    overflow: hidden;
    animation: fadeUp 0.4s 0.35s ease both;
  }

  .overlay-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: white;
    width: 0%;
    transition: width linear;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(0,0,0,0.72);
    color: white;
    font-size: 14px;
    padding: 10px 22px;
    border-radius: 50px;
    transition: transform 0.3s ease;
    z-index: 200;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ── CONFIG LINK (discret) ── */
  .config-link {
    position: fixed;
    bottom: 10px;
    right: 14px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    text-decoration: none;
    z-index: 10;
    transition: color 0.2s;
  }
  .config-link:hover { color: rgba(255,255,255,0.6); }
</style>
</head>

  }
};

// ── Son (Web Audio API — aucun fichier externe requis) ──
function playConfirmSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[440,0],[554,0.12],[659,0.24]].forEach(([freq, delay]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + delay + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.35);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.4);
    });
  } catch(e) {}
}

// ── Notification ntfy.sh ──
async function sendNtfy(service) {
  const s = SERVICES[service];
  const now = new Date();
  const hhmm = now.toLocaleTimeString('fr-BE', {hour:'2-digit', minute:'2-digit'});
  const body = `${s.msg} (${hhmm})`;

  try {
    const title = `ADL Finance - ${s.label}`;
    const res = await fetch(`${NTFY_BASE}/${s.topic}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain; charset=utf-8',
        'Title': encodeURIComponent(title),
        'Tags': s.tags,
        'Priority': String(s.priority)
      },
      body
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch(e) {
    showToast('⚠ Envoi réseau échoué — vérifiez la connexion');
  }
}

// ── Gestion du clic ──
let busy = false;
async function handleService(service) {
  if (busy) return;
  busy = true;

  const card = document.getElementById('card-' + service);
  card.classList.add('pressed');

  playConfirmSound();

  const s = SERVICES[service];
  document.getElementById('overlay-title').textContent = `Service ${s.label} — demande enregistrée`;
  document.getElementById('overlay-sub').textContent = 'Un conseiller va vous accueillir dans quelques instants';

  const overlay = document.getElementById('overlay');
  overlay.classList.add('show');

  // barre de progression
  const fill = document.getElementById('bar-fill');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  requestAnimationFrame(() => {
    fill.style.transition = 'width 4s linear';
    fill.style.width = '100%';
  });

  // Envoi ntfy en parallèle
  sendNtfy(service);

  // Fermeture après 4s
  setTimeout(() => {
    overlay.classList.remove('show');
    card.classList.remove('pressed');
    fill.style.transition = 'none';
    fill.style.width = '0%';
    busy = false;
  }, 4200);
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// Empêche le zoom sur double-tap (tablette)
document.addEventListener('dblclick', e => e.preventDefault(), {passive:false});
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
